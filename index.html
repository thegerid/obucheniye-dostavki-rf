<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5311f">
  <title>Мы теперь на sfago.ru</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260606-1">
  <style>
    :root {
      --brand: #f5311f;
      --brand-dark: #bd1408;
      --ink: #171717;
      --muted: #5c5c5c;
      --line: rgba(245, 49, 31, 0.14);
      --panel: rgba(255, 255, 255, 0.84);
      --shadow: 0 30px 90px rgba(37, 13, 10, 0.16);
      --font-ui: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 24px;
      color: var(--ink);
      font: 500 16px/1.5 var(--font-ui);
      background:
        radial-gradient(circle at top, rgba(245, 49, 31, 0.20), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(245, 49, 31, 0.12), transparent 24%),
        linear-gradient(180deg, #fff8f7 0%, #f7f2ef 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.6;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: -80px;
      left: -60px;
      background: rgba(245, 49, 31, 0.16);
    }

    body::after {
      width: 320px;
      height: 320px;
      right: -120px;
      bottom: -140px;
      background: rgba(94, 94, 94, 0.10);
    }

    .shell {
      width: min(100%, 880px);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 36px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(245, 49, 31, 0.08);
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 8px rgba(245, 49, 31, 0.14);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 1.1fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .lead {
      margin: 20px 0 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: clamp(18px, 2.3vw, 22px);
      line-height: 1.42;
    }

    .orbit-scene {
      position: relative;
      width: min(100%, 360px);
      aspect-ratio: 1;
      justify-self: center;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .orbit-scene::before,
    .orbit-scene::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line);
    }

    .orbit-scene::before {
      inset: 38px;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .orbit-scene::after {
      inset: 4px;
      border-style: dashed;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .orbit-scene:hover::before,
    .orbit-scene:hover::after,
    .orbit-scene:focus-within::before,
    .orbit-scene:focus-within::after {
      opacity: 0.95;
      transform: scale(1.01);
      border-color: rgba(245, 49, 31, 0.24);
    }

    .core-link {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 200px;
      display: grid;
      place-items: center;
      padding: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.78)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(251, 236, 234, 0.92));
      border: 1px solid rgba(245, 49, 31, 0.18);
      color: var(--brand-dark);
      text-align: center;
      text-decoration: none;
      box-shadow:
        0 22px 54px rgba(245, 49, 31, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .core-link:hover,
    .core-link:focus-visible {
      transform: scale(1.03);
      box-shadow:
        0 28px 68px rgba(245, 49, 31, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
    }

    .orbit-scene:hover .core-link,
    .orbit-scene:focus-within .core-link {
      animation: corePulse 1500ms cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    .core-link:focus-visible {
      outline: 3px solid rgba(245, 49, 31, 0.22);
      outline-offset: 5px;
    }

    .core-link small {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(189, 20, 8, 0.76);
    }

    .core-link strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      transform-origin: center;
      will-change: transform, opacity, filter;
      transition: filter 220ms ease, opacity 220ms ease;
    }

    .orbit.one {
      transform: rotate(var(--orbit-one-angle, 0deg));
    }

    .orbit.two {
      inset: 34px;
      transform: rotate(var(--orbit-two-angle, 0deg));
    }

    .logo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(245, 49, 31, 0.10);
      box-shadow: 0 14px 30px rgba(41, 17, 14, 0.10);
      will-change: transform, opacity, filter;
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .speed-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.96);
      transition: opacity 260ms ease, transform 260ms ease, filter 260ms ease;
    }

    .speed-ring.outer {
      width: 356px;
      height: 356px;
      border: 10px solid rgba(245, 49, 31, 0.32);
      box-shadow:
        0 0 28px rgba(245, 49, 31, 0.22),
        inset 0 0 18px rgba(245, 49, 31, 0.12);
    }

    .speed-ring.inner {
      width: 254px;
      height: 254px;
      border: 8px solid rgba(245, 49, 31, 0.26);
      box-shadow:
        0 0 22px rgba(245, 49, 31, 0.16),
        inset 0 0 16px rgba(245, 49, 31, 0.12);
    }

    .logo.a { transform: rotate(0deg) translateY(-178px) rotate(0deg); }
    .logo.b { transform: rotate(60deg) translateY(-178px) rotate(-60deg); }
    .logo.c { transform: rotate(120deg) translateY(-178px) rotate(-120deg); }
    .logo.d { transform: rotate(180deg) translateY(-178px) rotate(-180deg); }
    .logo.e { transform: rotate(240deg) translateY(-178px) rotate(-240deg); }
    .logo.f { transform: rotate(300deg) translateY(-178px) rotate(-300deg); }

    .orbit.two .logo.a { transform: rotate(30deg) translateY(-126px) rotate(-30deg); }
    .orbit.two .logo.b { transform: rotate(150deg) translateY(-126px) rotate(-150deg); }
    .orbit.two .logo.c { transform: rotate(270deg) translateY(-126px) rotate(-270deg); }

    @keyframes corePulse {
      0%,
      100% {
        transform: scale(1);
        box-shadow:
          0 22px 54px rgba(245, 49, 31, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }

      50% {
        transform: scale(1.035);
        box-shadow:
          0 28px 66px rgba(245, 49, 31, 0.24),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }
    }

    body.is-launching {
      overflow: hidden;
    }

    body.is-launching .orbit-scene {
      pointer-events: none;
    }

    body.is-launching .orbit.one,
    body.is-launching .orbit.two {
      filter: blur(4px) saturate(1.08);
      opacity: 1;
      transition: filter 1720ms ease, opacity 260ms ease;
    }

    body.is-launching .logo {
      opacity: 0.3;
      transition: opacity 1760ms linear, filter 1760ms linear;
      filter: blur(3px);
    }

    body.is-launching .speed-ring {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
      filter: blur(1.6px);
    }

    body.is-launching .speed-ring.outer {
      opacity: 0.96;
    }

    body.is-launching .speed-ring.inner {
      opacity: 0.9;
    }

    body.is-launching .core-link {
      transform: scale(0.96);
      box-shadow:
        0 14px 36px rgba(245, 49, 31, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
    }

    @media (max-width: 860px) {
      body {
        display: block;
        padding: 16px;
      }

      .shell {
        margin: 0 auto;
        padding: 26px 22px;
        border-radius: 28px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .text-block {
        text-align: center;
      }

      .lead {
        margin-left: auto;
        margin-right: auto;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .shell {
        padding: 20px 16px;
        border-radius: 24px;
      }

      .orbit-scene {
        width: min(100%, 300px);
      }

      .core-link {
        width: 168px;
        height: 168px;
      }

      .core-link strong {
        font-size: 28px;
      }

      .logo {
        width: 48px;
        height: 48px;
        margin: -24px;
        border-radius: 16px;
      }

      .logo.a { transform: rotate(0deg) translateY(-148px) rotate(0deg); }
      .logo.b { transform: rotate(60deg) translateY(-148px) rotate(-60deg); }
      .logo.c { transform: rotate(120deg) translateY(-148px) rotate(-120deg); }
      .logo.d { transform: rotate(180deg) translateY(-148px) rotate(-180deg); }
      .logo.e { transform: rotate(240deg) translateY(-148px) rotate(-240deg); }
      .logo.f { transform: rotate(300deg) translateY(-148px) rotate(-300deg); }

      .orbit.two .logo.a { transform: rotate(30deg) translateY(-106px) rotate(-30deg); }
      .orbit.two .logo.b { transform: rotate(150deg) translateY(-106px) rotate(-150deg); }
      .orbit.two .logo.c { transform: rotate(270deg) translateY(-106px) rotate(-270deg); }

      .speed-ring.outer {
        width: 298px;
        height: 298px;
      }

      .speed-ring.inner {
        width: 214px;
        height: 214px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .core-link,
      .speed-ring {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="badge">Новый адрес проекта</div>
    <section class="layout">
      <div class="text-block">
        <h1>Мы переехали</h1>
        <p class="lead">
          Учебный проект переехал на новый адрес. Нажмите на круг с логотипами, чтобы открыть актуальную версию.
        </p>
      </div>

      <div class="orbit-scene">
        <span class="speed-ring outer" aria-hidden="true"></span>
        <span class="speed-ring inner" aria-hidden="true"></span>

        <div class="orbit one">
          <span class="logo a"><img src="./favicon.svg" alt=""></span>
          <span class="logo b"><img src="./favicon.svg" alt=""></span>
          <span class="logo c"><img src="./favicon.svg" alt=""></span>
          <span class="logo d"><img src="./favicon.svg" alt=""></span>
          <span class="logo e"><img src="./favicon.svg" alt=""></span>
          <span class="logo f"><img src="./favicon.svg" alt=""></span>
        </div>

        <div class="orbit two">
          <span class="logo a"><img src="./favicon.svg" alt=""></span>
          <span class="logo b"><img src="./favicon.svg" alt=""></span>
          <span class="logo c"><img src="./favicon.svg" alt=""></span>
        </div>

        <a class="core-link" href="https://sfago.ru/">
          <span>
            <strong>Нажми</strong>
          </span>
        </a>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const orbitScene = document.querySelector(".orbit-scene");
      const coreLink = document.querySelector(".core-link");
      const orbitOne = document.querySelector(".orbit.one");
      const orbitTwo = document.querySelector(".orbit.two");
      const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const canVibrate = typeof navigator !== "undefined" && typeof navigator.vibrate === "function";

      if (!orbitScene || !coreLink || !orbitOne || !orbitTwo) {
        return;
      }

      let isLaunching = false;
      let isHovering = false;
      let rafId = 0;
      let lastTs = 0;
      let launchStartedAt = 0;

      const baseSpeed = { one: 20, two: -30 };
      const hoverSpeed = { one: 55, two: -82 };
      const launchSpeed = { one: 220, two: -320 };
      const launchSpeedMax = { one: 1480, two: -2140 };
      const currentSpeed = { ...baseSpeed };
      const targetSpeed = { ...baseSpeed };
      const angle = { one: 0, two: 0 };

      function setHoverState(nextHover) {
        if (isLaunching || prefersReducedMotion) {
          return;
        }

        isHovering = nextHover;
        targetSpeed.one = nextHover ? hoverSpeed.one : baseSpeed.one;
        targetSpeed.two = nextHover ? hoverSpeed.two : baseSpeed.two;
      }

      function tick(ts) {
        if (!lastTs) {
          lastTs = ts;
        }

        const dt = Math.min(34, ts - lastTs);
        lastTs = ts;

        if (isLaunching) {
          const launchElapsed = ts - launchStartedAt;
          const launchProgress = Math.min(1, launchElapsed / 1820);
          const eased = 1 - Math.pow(1 - launchProgress, 3);
          targetSpeed.one = launchSpeed.one + (launchSpeedMax.one - launchSpeed.one) * eased;
          targetSpeed.two = launchSpeed.two + (launchSpeedMax.two - launchSpeed.two) * eased;

          const blur = 1.2 + 4.8 * eased;
          orbitOne.style.filter = `blur(${blur}px) saturate(1.08)`;
          orbitTwo.style.filter = `blur(${blur}px) saturate(1.08)`;
        }

        const response = isLaunching ? 0.0072 : isHovering ? 0.0095 : 0.0065;
        const alpha = 1 - Math.exp(-dt * response);

        currentSpeed.one += (targetSpeed.one - currentSpeed.one) * alpha;
        currentSpeed.two += (targetSpeed.two - currentSpeed.two) * alpha;

        angle.one = (angle.one + currentSpeed.one * dt / 1000) % 360;
        angle.two = (angle.two + currentSpeed.two * dt / 1000) % 360;

        orbitOne.style.setProperty("--orbit-one-angle", `${angle.one}deg`);
        orbitTwo.style.setProperty("--orbit-two-angle", `${angle.two}deg`);

        rafId = window.requestAnimationFrame(tick);
      }

      function playLaunchVibration() {
        if (!canVibrate) {
          return;
        }

        // Start with one distinct buzz, then shorten the pauses to mimic takeoff acceleration.
        navigator.vibrate([36, 240, 16, 170, 20, 120, 24, 86, 28, 60, 34, 42, 42, 28, 52]);
      }

      function launch(event) {
        if (isLaunching) {
          event.preventDefault();
          return;
        }

        isLaunching = true;
        event.preventDefault();
        targetSpeed.one = launchSpeed.one;
        targetSpeed.two = launchSpeed.two;
        launchStartedAt = performance.now();
        playLaunchVibration();
        document.body.classList.add("is-launching");

        window.setTimeout(() => {
          window.location.assign(coreLink.href);
        }, 2080);
      }

      if (!prefersReducedMotion) {
        rafId = window.requestAnimationFrame(tick);
      }

      orbitScene.addEventListener("mouseenter", () => setHoverState(true));
      orbitScene.addEventListener("mouseleave", () => setHoverState(false));
      orbitScene.addEventListener("focusin", () => setHoverState(true));
      orbitScene.addEventListener("focusout", () => setHoverState(false));

      coreLink.addEventListener("click", launch);

      orbitScene.addEventListener("click", (event) => {
        if (event.target.closest(".core-link")) {
          return;
        }

        launch(event);
      });

      coreLink.addEventListener("keydown", (event) => {
        if (event.key === " " || event.key === "Spacebar") {
          launch(event);
        }
      });

      window.addEventListener("beforeunload", () => {
        if (rafId) {
          window.cancelAnimationFrame(rafId);
        }
      });
    })();
  </script>
</body>
</html>
