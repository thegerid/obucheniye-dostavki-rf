<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f5311f">
  <title>Мы теперь на sfago.ru</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg?v=20260606-1">
  <style>
    :root {
      --brand: #f5311f;
      --brand-dark: #bd1408;
      --ink: #171717;
      --muted: #5c5c5c;
      --line: rgba(245, 49, 31, 0.14);
      --panel: rgba(255, 255, 255, 0.84);
      --shadow: 0 30px 90px rgba(37, 13, 10, 0.16);
      --font-ui: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 24px;
      color: var(--ink);
      font: 500 16px/1.5 var(--font-ui);
      background:
        radial-gradient(circle at top, rgba(245, 49, 31, 0.20), transparent 28%),
        radial-gradient(circle at 18% 78%, rgba(245, 49, 31, 0.12), transparent 24%),
        linear-gradient(180deg, #fff8f7 0%, #f7f2ef 100%);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(18px);
      opacity: 0.6;
    }

    body::before {
      width: 240px;
      height: 240px;
      top: -80px;
      left: -60px;
      background: rgba(245, 49, 31, 0.16);
    }

    body::after {
      width: 320px;
      height: 320px;
      right: -120px;
      bottom: -140px;
      background: rgba(94, 94, 94, 0.10);
    }

    .shell {
      position: relative;
      width: min(100%, 880px);
      padding: 32px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 36px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      transform-origin: 73% 54%;
      transition: transform 220ms ease, box-shadow 220ms ease, opacity 220ms ease;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(245, 49, 31, 0.08);
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--brand);
      box-shadow: 0 0 0 8px rgba(245, 49, 31, 0.14);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 1.1fr) minmax(280px, 0.9fr);
      gap: 28px;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 6vw, 68px);
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .lead {
      margin: 20px 0 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: clamp(18px, 2.3vw, 22px);
      line-height: 1.42;
    }

    .orbit-scene {
      position: relative;
      width: min(100%, 360px);
      aspect-ratio: 1;
      justify-self: center;
      display: grid;
      place-items: center;
      cursor: pointer;
    }

    .orbit-scene::before,
    .orbit-scene::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--line);
    }

    .orbit-scene::before {
      inset: 38px;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .orbit-scene::after {
      inset: 4px;
      border-style: dashed;
      transition: opacity 180ms ease, transform 180ms ease, border-color 180ms ease;
    }

    .orbit-scene:hover::before,
    .orbit-scene:hover::after,
    .orbit-scene:focus-within::before,
    .orbit-scene:focus-within::after {
      opacity: 0.95;
      transform: scale(1.01);
      border-color: rgba(245, 49, 31, 0.24);
    }

    .core-link {
      position: relative;
      z-index: 2;
      width: 200px;
      height: 200px;
      display: grid;
      place-items: center;
      padding: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.78)),
        linear-gradient(180deg, rgba(255, 255, 255, 0.95), rgba(251, 236, 234, 0.92));
      border: 1px solid rgba(245, 49, 31, 0.18);
      color: var(--brand-dark);
      text-align: center;
      text-decoration: none;
      box-shadow:
        0 22px 54px rgba(245, 49, 31, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .core-link:hover,
    .core-link:focus-visible {
      transform: scale(1.03);
      box-shadow:
        0 28px 68px rgba(245, 49, 31, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.96);
    }

    .core-link:focus-visible {
      outline: 3px solid rgba(245, 49, 31, 0.22);
      outline-offset: 5px;
    }

    .core-link small {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(189, 20, 8, 0.76);
    }

    .core-link strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .orbit {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      animation: spin 18s linear infinite;
      transform-origin: center;
      will-change: transform, opacity, filter;
    }

    .orbit.two {
      inset: 34px;
      animation-duration: 12s;
      animation-direction: reverse;
    }

    .orbit-scene:hover .orbit.one,
    .orbit-scene:focus-within .orbit.one {
      animation-duration: 6.5s;
    }

    .orbit-scene:hover .orbit.two,
    .orbit-scene:focus-within .orbit.two {
      animation-duration: 4.4s;
    }

    .logo {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 56px;
      height: 56px;
      margin: -28px;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(245, 49, 31, 0.10);
      box-shadow: 0 14px 30px rgba(41, 17, 14, 0.10);
      will-change: transform, opacity, filter;
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
    }

    .streak-ring,
    .vortex-core {
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
      opacity: 0;
    }

    .streak-ring {
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.7);
    }

    .streak-ring.outer {
      width: 356px;
      height: 356px;
      border: 10px solid rgba(245, 49, 31, 0.42);
      box-shadow:
        0 0 28px rgba(245, 49, 31, 0.28),
        inset 0 0 28px rgba(245, 49, 31, 0.2);
    }

    .streak-ring.inner {
      width: 254px;
      height: 254px;
      border: 8px solid rgba(245, 49, 31, 0.34);
      box-shadow:
        0 0 22px rgba(245, 49, 31, 0.2),
        inset 0 0 22px rgba(245, 49, 31, 0.18);
    }

    .vortex-core {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.18);
      background:
        radial-gradient(circle, #040404 0 28%, rgba(10, 10, 10, 0.98) 34%, rgba(245, 49, 31, 0.48) 50%, rgba(245, 49, 31, 0.08) 62%, rgba(255, 255, 255, 0) 76%);
      filter: blur(0);
    }

    .event-horizon {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 9;
    }

    .event-horizon::before,
    .event-horizon::after {
      content: "";
      position: absolute;
      left: 72%;
      top: 54%;
      border-radius: 50%;
      transform: translate(-50%, -50%) scale(0.12);
      opacity: 0;
    }

    .event-horizon::before {
      width: 160px;
      height: 160px;
      background:
        radial-gradient(circle, #020202 0 26%, rgba(2, 2, 2, 0.98) 34%, rgba(245, 49, 31, 0.28) 48%, rgba(245, 49, 31, 0.06) 60%, rgba(255, 255, 255, 0) 72%);
      filter: blur(0);
    }

    .event-horizon::after {
      inset: 0;
      left: auto;
      top: auto;
      border-radius: 0;
      transform: none;
      background:
        radial-gradient(circle at 72% 54%, rgba(8, 7, 9, 0) 0 6%, rgba(8, 7, 9, 0.55) 11%, rgba(8, 7, 9, 0.82) 20%, rgba(8, 7, 9, 0.96) 34%, rgba(5, 5, 6, 1) 100%);
    }

    .logo.a { transform: rotate(0deg) translateY(-178px) rotate(0deg); }
    .logo.b { transform: rotate(60deg) translateY(-178px) rotate(-60deg); }
    .logo.c { transform: rotate(120deg) translateY(-178px) rotate(-120deg); }
    .logo.d { transform: rotate(180deg) translateY(-178px) rotate(-180deg); }
    .logo.e { transform: rotate(240deg) translateY(-178px) rotate(-240deg); }
    .logo.f { transform: rotate(300deg) translateY(-178px) rotate(-300deg); }

    .orbit.two .logo.a { transform: rotate(30deg) translateY(-126px) rotate(-30deg); }
    .orbit.two .logo.b { transform: rotate(150deg) translateY(-126px) rotate(-150deg); }
    .orbit.two .logo.c { transform: rotate(270deg) translateY(-126px) rotate(-270deg); }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes streakOrbit {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.72) rotate(0deg);
        filter: blur(0);
      }

      28% {
        opacity: 1;
      }

      100% {
        opacity: 0.96;
        transform: translate(-50%, -50%) scale(1) rotate(1080deg);
        filter: blur(3px);
      }
    }

    @keyframes vortexCollapse {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.18);
        filter: blur(0);
      }

      38% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(0.92);
        filter: blur(0);
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(4.8);
        filter: blur(8px);
      }
    }

    @keyframes orbitImplode {
      0% {
        opacity: 1;
        transform: scale(1) rotate(0deg);
        filter: blur(0);
      }

      58% {
        opacity: 1;
        transform: scale(1.04) rotate(720deg);
        filter: blur(2px);
      }

      100% {
        opacity: 0;
        transform: scale(0.16) rotate(1680deg);
        filter: blur(12px);
      }
    }

    @keyframes logoSmear {
      0% {
        opacity: 1;
        filter: blur(0);
      }

      45% {
        opacity: 1;
        filter: blur(1px);
      }

      100% {
        opacity: 0;
        filter: blur(10px);
      }
    }

    @keyframes coreDive {
      0% {
        opacity: 1;
        transform: scale(1);
        box-shadow:
          0 22px 54px rgba(245, 49, 31, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.96);
      }

      40% {
        opacity: 1;
        transform: scale(1.08);
      }

      100% {
        opacity: 0;
        transform: scale(0.1);
        box-shadow:
          0 0 0 rgba(245, 49, 31, 0),
          inset 0 0 0 rgba(255, 255, 255, 0);
      }
    }

    @keyframes shellSingularity {
      0% {
        opacity: 1;
        transform: scale(1) translate3d(0, 0, 0);
        filter: blur(0);
      }

      32% {
        opacity: 1;
        transform: scale(1.02) translate3d(0, 0, 0);
      }

      100% {
        opacity: 0;
        transform: translate3d(220px, 0, 0) scale(0.05);
        filter: blur(18px);
      }
    }

    @keyframes copyPull {
      0% {
        opacity: 1;
        transform: translate3d(0, 0, 0);
      }

      100% {
        opacity: 0;
        transform: translate3d(90px, -10px, 0) scale(0.92);
      }
    }

    @keyframes horizonBloom {
      0% {
        opacity: 0;
      }

      18% {
        opacity: 1;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes horizonCore {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.14);
        filter: blur(0);
      }

      30% {
        opacity: 1;
      }

      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(10);
        filter: blur(12px);
      }
    }

    body.is-launching {
      overflow: hidden;
    }

    body.is-launching .shell {
      animation: shellSingularity 1250ms cubic-bezier(0.2, 0.82, 0.14, 1) forwards;
      pointer-events: none;
    }

    body.is-launching .text-block,
    body.is-launching .badge {
      animation: copyPull 620ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    body.is-launching .orbit.one,
    body.is-launching .orbit.two {
      animation: orbitImplode 980ms cubic-bezier(0.26, 0.76, 0.22, 1) forwards;
    }

    body.is-launching .logo {
      animation: logoSmear 780ms linear forwards;
    }

    body.is-launching .streak-ring {
      animation: streakOrbit 920ms linear forwards;
    }

    body.is-launching .streak-ring.inner {
      animation-duration: 760ms;
    }

    body.is-launching .vortex-core {
      animation: vortexCollapse 1080ms cubic-bezier(0.18, 0.88, 0.16, 1) forwards;
    }

    body.is-launching .core-link {
      animation: coreDive 820ms cubic-bezier(0.26, 0.86, 0.18, 1) forwards;
    }

    body.is-launching .event-horizon {
      animation: horizonBloom 1180ms ease forwards;
    }

    body.is-launching .event-horizon::before {
      animation: horizonCore 1180ms cubic-bezier(0.16, 0.9, 0.12, 1) forwards;
    }

    body.is-launching .event-horizon::after {
      animation: horizonBloom 780ms ease forwards;
    }

    @media (max-width: 860px) {
      body {
        display: block;
        padding: 16px;
      }

      .shell {
        margin: 0 auto;
        padding: 26px 22px;
        border-radius: 28px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .text-block {
        text-align: center;
      }

      .lead {
        margin-left: auto;
        margin-right: auto;
      }

      .event-horizon::before {
        left: 50%;
        top: 66%;
      }
    }

    @media (max-width: 520px) {
      body {
        padding: 14px;
      }

      .shell {
        padding: 20px 16px;
        border-radius: 24px;
      }

      .orbit-scene {
        width: min(100%, 300px);
      }

      .core-link {
        width: 168px;
        height: 168px;
      }

      .core-link strong {
        font-size: 28px;
      }

      .logo {
        width: 48px;
        height: 48px;
        margin: -24px;
        border-radius: 16px;
      }

      .logo.a { transform: rotate(0deg) translateY(-148px) rotate(0deg); }
      .logo.b { transform: rotate(60deg) translateY(-148px) rotate(-60deg); }
      .logo.c { transform: rotate(120deg) translateY(-148px) rotate(-120deg); }
      .logo.d { transform: rotate(180deg) translateY(-148px) rotate(-180deg); }
      .logo.e { transform: rotate(240deg) translateY(-148px) rotate(-240deg); }
      .logo.f { transform: rotate(300deg) translateY(-148px) rotate(-300deg); }

      .orbit.two .logo.a { transform: rotate(30deg) translateY(-106px) rotate(-30deg); }
      .orbit.two .logo.b { transform: rotate(150deg) translateY(-106px) rotate(-150deg); }
      .orbit.two .logo.c { transform: rotate(270deg) translateY(-106px) rotate(-270deg); }

      .streak-ring.outer {
        width: 298px;
        height: 298px;
      }

      .streak-ring.inner {
        width: 214px;
        height: 214px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .orbit,
      .core-link,
      .shell,
      .text-block,
      .badge,
      .streak-ring,
      .vortex-core,
      .event-horizon {
        animation: none;
        transition: none;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="badge">Новый адрес проекта</div>
    <section class="layout">
      <div class="text-block">
        <h1>Мы переехали</h1>
        <p class="lead">
          Учебный проект переехал на новый адрес. Нажмите на круг с логотипами, чтобы открыть актуальную версию.
        </p>
      </div>

      <div class="orbit-scene">
        <span class="streak-ring outer" aria-hidden="true"></span>
        <span class="streak-ring inner" aria-hidden="true"></span>
        <span class="vortex-core" aria-hidden="true"></span>

        <div class="orbit one">
          <span class="logo a"><img src="./favicon.svg" alt=""></span>
          <span class="logo b"><img src="./favicon.svg" alt=""></span>
          <span class="logo c"><img src="./favicon.svg" alt=""></span>
          <span class="logo d"><img src="./favicon.svg" alt=""></span>
          <span class="logo e"><img src="./favicon.svg" alt=""></span>
          <span class="logo f"><img src="./favicon.svg" alt=""></span>
        </div>

        <div class="orbit two">
          <span class="logo a"><img src="./favicon.svg" alt=""></span>
          <span class="logo b"><img src="./favicon.svg" alt=""></span>
          <span class="logo c"><img src="./favicon.svg" alt=""></span>
        </div>

        <a class="core-link" href="https://sfago.ru/">
          <span>
            <strong>Нажми</strong>
          </span>
        </a>
      </div>
    </section>
  </main>
  <div class="event-horizon" aria-hidden="true"></div>

  <script>
    (() => {
      const orbitScene = document.querySelector(".orbit-scene");
      const coreLink = document.querySelector(".core-link");

      if (!orbitScene || !coreLink) {
        return;
      }

      let isLaunching = false;

      function launch(event) {
        if (isLaunching) {
          event.preventDefault();
          return;
        }

        isLaunching = true;
        event.preventDefault();
        document.body.classList.add("is-launching");

        window.setTimeout(() => {
          window.location.assign(coreLink.href);
        }, 1180);
      }

      coreLink.addEventListener("click", launch);

      orbitScene.addEventListener("click", (event) => {
        if (event.target.closest(".core-link")) {
          return;
        }

        launch(event);
      });

      coreLink.addEventListener("keydown", (event) => {
        if (event.key === " " || event.key === "Spacebar") {
          launch(event);
        }
      });
    })();
  </script>
</body>
</html>
